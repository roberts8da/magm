name: Magma Restart
on:
  workflow_dispatch:
  schedule:
    - cron: '59 3 17 4 *' # 下一个: 2026-04-17 03:59 UTC (到期前2天执行)

jobs:
  Restart:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: write
      contents: write

    steps:
      - name: 📥 拉取程式碼（從私庫 magma 複製檔案）
        uses: actions/checkout@v4
        with:
          # ─── 核心修改：利用官方 Git 工具直接把您的私庫完整拉下來 ───
          repository: roberts8da/magma
          path: .
          token: ${{ secrets.REPO_TOKEN }}

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 安装底层依赖与浏览器
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb xdotool wget unzip curl
          python -m pip install --upgrade pip
          pip install seleniumbase requests
          seleniumbase install chromedriver

      - name: 🙈 隐藏敏感信息
        env:
          MAGMANODE: ${{ secrets.MAGMANODE }}
          MAGMA_PROXY: ${{ secrets.MAGMA_PROXY }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          if [ -n "$MAGMANODE" ]; then echo "::add-mask::$MAGMANODE"; fi
          if [ -n "$MAGMA_PROXY" ]; then echo "::add-mask::$MAGMA_PROXY"; fi
          if [ -n "$BOT_TOKEN" ]; then echo "::add-mask::$BOT_TOKEN"; fi
          if [ -n "$TG_CHAT_ID" ]; then echo "::add-mask::$TG_CHAT_ID"; fi
          if [ -n "$REPO_TOKEN" ]; then echo "::add-mask::$REPO_TOKEN"; fi

      - name: 🛡️ 安装并启动代理
        env:
          MAGMA_PROXY: ${{ secrets.MAGMA_PROXY }}
        run: |
          if [ -z "$MAGMA_PROXY" ]; then
            echo "[INFO] 未配置代理，直连模式"
            echo "PROXY_SERVER=" >> $GITHUB_ENV
            echo "NETWORK_MODE=直连" >> $GITHUB_ENV
            exit 0
          fi

          wget -q https://github.com
          unzip -q Xray-linux-64.zip -d xray
          chmod +x xray/xray

          python3 << 'PYEOF'
          import os, sys, json, base64
          from urllib.parse import parse_qs, unquote
          def mask(value): return f"{value[:2]}***{value[-2:]}" if len(value) > 4 else "****"
          url = os.environ.get("MAGMA_PROXY", "").strip()
          if not url: sys.exit(1)
          if url.startswith("socks5://") or url.startswith("socks://"):
              with open("use_external_socks.txt", "w", encoding="utf-8") as h: h.write(url.split("#", 1)[0])
              sys.exit(0)
          # (此處保持您原本的 Vless/Vmess/Trojan 解析邏輯即可)
          PYEOF

          if [ -f "use_external_socks.txt" ]; then
            EXTERNAL_SOCKS=$(cat use_external_socks.txt)
            echo "PROXY_SERVER=$EXTERNAL_SOCKS" >> $GITHUB_ENV
            echo "NETWORK_MODE=代理" >> $GITHUB_ENV
            exit 0
          fi

          ./xray/xray run -c xray_config.json > xray.log 2>&1 &
          sleep 5

          echo "[INFO] 测试代理连接..."
          for i in 1 2 3 4 5; do
            if curl -x socks5://127.0.0.1:1080 -s --max-time 15 https://ipify.org > /dev/null 2>&1; then
              echo "[INFO] ✅ 代理连接成功"
              # 這裡自動切除 socks5:// 前綴，防止您的 SeleniumBase 啟動時崩潰
              echo "PROXY_SERVER=127.0.0.1:1080" >> $GITHUB_ENV
              echo "NETWORK_MODE=代理" >> $GITHUB_ENV
              exit 0
            fi
            sleep 3
          done
          echo "PROXY_SERVER=" >> $GITHUB_ENV
          echo "NETWORK_MODE=直连" >> $GITHUB_ENV

      - name: 🚀 运行 Magma Python 脚本
        env:
          MAGMANODE: ${{ secrets.MAGMANODE }}
          MAGMA_PROXY: ${{ env.PROXY_SERVER }}
          NETWORK_MODE: ${{ env.NETWORK_MODE }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          echo "=== 檔案已透過官方 Git 安全拉取完成 ==="
          # 直接執行當前目錄下的 main.py
          xvfb-run -a python main.py

      - name: 🧹 清理旧的运行记录 
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 4
